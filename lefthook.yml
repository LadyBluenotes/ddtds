pre-commit:
  jobs:
    - name: format
      glob: "*.{ts,tsx,js,jsx,mts,cts,mjs,cjs}"
      run: pnpm run format {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: lint
      run: pnpm run lint
    - name: typecheck
      run: pnpm run typecheck
    - name: test
      run: pnpm run test
